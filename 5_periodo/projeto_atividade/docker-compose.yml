services:
  redis:
    image: redis:7-alphine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000.8000"
    enviroment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      volumes:
      - ./api:/code

  worker:
    build: ./worker
    enviroment:
      REDIS_URL: redis://redis:6379
    depends_on:
        redis:
          condition:
